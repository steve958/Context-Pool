services:
  backend:
    image: steve958/context-pool-backend:latest
    container_name: context-pool-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - documents_data:/data/documents
      - ./config:/data/config
    environment:
      - DATA_DIR=/data/documents
      - CONFIG_PATH=/data/config/config.yaml
      - OCR_API_KEY=${OCR_API_KEY:-}
      - API_KEY=${API_KEY:-}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - context-pool-net

  frontend:
    image: steve958/context-pool-frontend:latest
    container_name: context-pool-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_KEY=${API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - context-pool-net

volumes:
  documents_data:

networks:
  context-pool-net:
    driver: bridge
